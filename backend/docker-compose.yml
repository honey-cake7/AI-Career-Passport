version: '3.8'

services:
  backend:
    build: .
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=development
      - MONGODB_URI=mongodb://mongodb:27017/ai-career-passport
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=skill_taxonomy
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
    restart: unless-stopped
    depends_on:
      - mongodb
      - qdrant
    volumes:
      # Optional: cache fastembed models to avoid re-downloading on every restart
      - local_model_cache:/app/local_cache

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  mongodb_data:
  qdrant_data:
  local_model_cache:
